IMU_publisher:
    ros__parameters:
        serial_port: "/dev/ttyUSB0"
        baud_rate: 921600
        frame_id: "imu_link"
        imu_switch: TRUE
        imu_topic: "/IMU_data"
        hardware_attitude_reset_on_start: TRUE
        hardware_attitude_reset_delay_ms: 300
        reset_attitude_on_start: TRUE
        reset_attitude_delay_ms: 500
        euler_switch: FALSE
        euler_topic: "/euler_data"
        magnetic_switch: FALSE
        magnetic_topic: "/magnetic_data"
        temperature_switch: FALSE
        temperature_topic: "/temp_data"
        pressure_switch: FALSE
        pressure_topic: "/pressure_data"
